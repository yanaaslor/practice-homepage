<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <!-- Styles -->
    <link rel="stylesheet" href="./styles/modern-normalize.css" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/components/header.css" />
    <link rel="stylesheet" href="./styles/components/mobile-nav.css" />
    <link rel="stylesheet" href="./styles/utils.css" />
    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.lineicons.com/5.1/line/lineicons.css"
    />

    <title>Final Project</title>
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="container">
        <div class="header__title-container">
          <img
            src="./public/logo.png"
            alt="a girl holding a cup of coffee"
            width="720"
            height="972"
            class="header__logo"
          />
          <span class="header__title strong-voice">scoop the cup</span>
        </div>

        <nav class="header__menu">
          <div class="header__social-container">
            <a
              href="https://github.com/yanaaslor"
              target="_blank"
              rel="noopener noreferrer"
              title="github"
              aria-label="github link"
              class="header__social"
            >
              <i aria-hidden="true" class="lni lni-github"></i>
            </a>

            <a
              href="https://discord.com/users/kitsunekami_."
              target="_blank"
              rel="noopener noreferrer"
              title="discord"
              aria-label="discord link"
              class="header__social"
            >
              <i aria-hidden="true" class="lni lni-discord"></i>
            </a>

            <a
              href="https://www.youtube.com/@youtubeweb3009"
              target="_blank"
              rel="noopener noreferrer"
              title="youtube"
              aria-label="youtube link"
              class="header__social"
            >
              <i aria-hidden="true" class="lni lni-youtube"></i>
            </a>
          </div>

          <div class="header__separator"></div>
          <a href="#" class="header__sign-in-btn option-voice">Sign in</a>
          <a href="#" class="header__enter-app-btn option-voice btn">
            Enter App
            <svg
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
              class="header__enter-app-btn__arrow"
            >
              <path
                fill-rule="evenodd"
                d="M12.97 3.97a.75.75 0 0 1 1.06 0l7.5 7.5a.75.75 0 0 1 0 1.06l-7.5 7.5a.75.75 0 1 1-1.06-1.06l6.22-6.22H3a.75.75 0 0 1 0-1.5h16.19l-6.22-6.22a.75.75 0 0 1 0-1.06Z"
                clip-rule="evenodd"
              />
            </svg>
          </a>
        </nav>

        <button class="header__bars" aria-label="menu button">
          <svg
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
            />
          </svg>
        </button>
      </div>
    </header>

    <!-- Mobile Nav -->
    <div class="mobile-nav">
      <button class="mobile-nav__close-btn">Close</button>
      <img
        src="./public/logo.png"
        alt="a girl holding a cup of coffee"
        width="720"
        height="972"
        class="mobile-nav__logo"
      />

      <div class="mobile-nav__social-container">
        <a
          href="https://github.com/yanaaslor"
          target="_blank"
          rel="noopener noreferrer"
          title="github"
          aria-label="github link"
          class="mobile-nav__social"
        >
          <i aria-hidden="true" class="lni lni-github"></i>
        </a>

        <a
          href="https://discord.com/users/kitsunekami_."
          target="_blank"
          rel="noopener noreferrer"
          title="discord"
          aria-label="discord link"
          class="mobile-nav__social"
        >
          <i aria-hidden="true" class="lni lni-discord"></i>
        </a>

        <a
          href="https://www.youtube.com/@youtubeweb3009"
          target="_blank"
          rel="noopener noreferrer"
          title="youtube"
          aria-label="youtube link"
          class="mobile-nav__social"
        >
          <i aria-hidden="true" class="lni lni-youtube"></i>
        </a>
      </div>

      <div class="mobile-nav__separator"></div>
      <a href="#" class="mobile-nav__sign-in-btn option-voice">Sign in</a>
      <a href="#" class="mobile-nav__enter-app-btn option-voice btn">
        Enter App
        <svg
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="mobile-nav__enter-app-btn__arrow"
        >
          <path
            fill-rule="evenodd"
            d="M12.97 3.97a.75.75 0 0 1 1.06 0l7.5 7.5a.75.75 0 0 1 0 1.06l-7.5 7.5a.75.75 0 1 1-1.06-1.06l6.22-6.22H3a.75.75 0 0 1 0-1.5h16.19l-6.22-6.22a.75.75 0 0 1 0-1.06Z"
            clip-rule="evenodd"
          />
        </svg>
      </a>
    </div>

    <!-- <section></section> -->
    <!-- <section></section> -->
    <!-- <section></section> -->
    <!-- </main> -->

  </body>
</html>
